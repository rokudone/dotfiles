# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

# You can use it to add commands that run after login to macOS user session.
# 'start-at-login' needs to be 'true' for 'after-login-command' to work
# Available commands: https://nikitabobko.github.io/AeroSpace/commands
after-login-command = []

# You can use it to add commands that run after AeroSpace startup.
# 'after-startup-command' is run after 'after-login-command'
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = ['exec-and-forget borders']

# Start AeroSpace at login
start-at-login = true

config-version = 2
# persistent-workspaces = ["1", "2", "3"]  # モニター数分は自動作成されるので不要

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 0

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'


# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = false

# Possible values: (qwerty|dvorak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See: https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
inner.horizontal = 5
inner.vertical =   5
outer.left =       5
outer.bottom =     5
outer.top =        5
outer.right =      5

# Aqua Voiceをフローティングにして管理対象から外す
[[on-window-detected]]
if.app-id = 'com.electron.aqua-voice'
run = 'layout floating'

# Google Chromeをワークスペース1に固定
[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'
run = 'move-node-to-workspace 4'

# Finderをフローティングにして管理対象から外す
[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

# =============================================================================
# 1. フォーカス切り替え（上下左右）- alt-矢印
# =============================================================================
alt-left = 'move --boundaries all-monitors-outer-frame left'
alt-right = 'move --boundaries all-monitors-outer-frame right'
alt-up = 'move --boundaries all-monitors-outer-frame up'
alt-down = 'move --boundaries all-monitors-outer-frame down'

# =============================================================================
# 2. ワークスペース移動 - alt-shift-矢印
# =============================================================================
alt-shift-left = 'move-workspace-to-monitor --wrap-around left'
alt-shift-right = 'move-workspace-to-monitor --wrap-around right'
alt-shift-up = 'move-workspace-to-monitor --wrap-around up'
alt-shift-down = 'move-workspace-to-monitor --wrap-around down'

# =============================================================================
# 同一モニター内のWS切り替え - alt-backspace
# =============================================================================
alt-backspace = 'workspace --wrap-around next'

# =============================================================================
# 3. レイアウト切替トグル - alt-enter
# =============================================================================
alt-enter = 'fullscreen'
alt-shift-enter = 'layout h_tiles v_tiles'

# =============================================================================
# 4. 右隣とネスト（join-with right）- alt-slash
# =============================================================================
alt-slash = 'join-with right'

# # =============================================================================
# # 5. 同一モニター内のWS切り替え（次/前）- alt-pgup/pgdn
# # =============================================================================
# alt-pageUp = 'workspace --wrap-around prev'
# alt-pageDown = 'workspace --wrap-around next'
#
# # =============================================================================
# # 6. WS新規作成＋ウィンドウ移動 - alt-shift-enter
# # =============================================================================
# cmd-enter = '''exec-and-forget ws=$(aerospace list-workspaces --all --format "%{workspace}" | grep -E "^[0-9]+$" | sort -n | awk 'BEGIN{n=1} {if ($1==n) {n++} else if ($1>n) {exit}} END{print n}')
# aerospace move-node-to-workspace --focus-follows-window "$ws"'''
#
# # =============================================================================
# # 7. 同一モニター内の別WSへウィンドウ送る（次/前）- cmd-up/down
# # =============================================================================
# cmd-up = 'move-node-to-workspace --wrap-around prev'
# cmd-down = 'move-node-to-workspace --wrap-around next'
#
# # =============================================================================
# # 8. WSをモニター間移動（左右）- cmd-left/right
# # =============================================================================
# cmd-left = 'move-workspace-to-monitor --wrap-around left'
# cmd-right = 'move-workspace-to-monitor --wrap-around right'

# =============================================================================
# その他（リサイズなど）
# =============================================================================
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

# ウィンドウを縮める
alt-period = 'resize width -600'

# サービスモー
alt-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']