    bold: { family: "源ノ角ゴシック Code JP", style: B }
    italic: { family: "源ノ角ゴシック Code JP", style: N It }
    size: 22.0
    offset: {x: 0, y: 5}

  yutapon: &yutapon
    normal: { family: "ゆたぽん（コーディング）", style: Regular }
    bold: { family: "ゆたぽん（コーディング）Bold", style: Bold }
    italic: { family: "ゆたぽん（コーディング）Bold", style: Bold }
    size: 22.0
    offset: {x: 0, y: 15}


